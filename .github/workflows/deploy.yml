name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd server && npm install
    
    - name: Build application
      run: npm run build
    
    - name: Create deployment package
      run: |
        mkdir -p deployment
        cp -r dist/* deployment/
        cp -r server/* deployment/server/
        cp package.json deployment/
        cp server/package.json deployment/server/
        # Exclude database files
        rm -f deployment/server/enoterra_erp.db*
    
    - name: Deploy to Hostinger
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "deployment/"
        TARGET: "/home/${{ secrets.REMOTE_USER }}/public_html/"
        EXCLUDE: "server/enoterra_erp.db, server/enoterra_erp.db-wal, server/enoterra_erp.db-shm"
    
    - name: Install dependencies on server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "cd public_html/server && npm install --production"
    
    - name: Restart server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "pm2 restart enoterra_erp || cd public_html/server && node index.js &"
    
    - name: Health check
      run: |
        sleep 10
        curl -f https://erp.enoterra.pl/api/health || echo "Health check failed, but deployment might still be successful" 