name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd server && npm install
    
    - name: Build application
      run: npm run build
    
    - name: Deploy to Hostinger
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "dist/,server/,ecosystem.config.js,setup_server.sh"
        TARGET: "/home/${{ secrets.REMOTE_USER }}/public_html/"
        EXCLUDE: "server/enoterra_erp.db"
        ARGS: "-avz --delete"
    
    - name: Copy additional files
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd public_html
          echo "Copying ecosystem.config.js..."
          if [ -f "ecosystem.config.js" ]; then
            echo "ecosystem.config.js copied successfully"
          else
            echo "ecosystem.config.js not found in source"
          fi
          echo "Copying setup_server.sh..."
          if [ -f "setup_server.sh" ]; then
            echo "setup_server.sh copied successfully"
          else
            echo "setup_server.sh not found in source"
          fi
    
    - name: Install dependencies on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd public_html
          npm install --production
          cd server && npm install --production
    
    - name: Initialize database on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd public_html/server
          if [ ! -f "enoterra_erp.db" ]; then
            echo "Creating new database..."
            node clean_database.mjs
          else
            echo "Database already exists"
          fi
    
    - name: Run database migrations
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd public_html/server
          if [ -f "database_migrations.mjs" ]; then
            node database_migrations.mjs
          else
            echo "No database migrations found"
          fi
    
    - name: Setup PM2 and restart
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd public_html
          if command -v pm2 &> /dev/null; then
            echo "PM2 is installed"
            pm2 restart enoterra_erp || echo "PM2 restart failed"
          else
            echo "PM2 not found, installing..."
            npm install -g pm2
            pm2 start ecosystem.config.js || echo "PM2 start failed"
          fi 