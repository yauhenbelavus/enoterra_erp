name: Deploy to VPS

on:
  push:
    branches: [ new-main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd server && npm install
    
    - name: Build application
      run: npm run build
    
    - name: Create directory on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p /home/$USER/enoterra_erp/logs
          mkdir -p /home/$USER/enoterra_erp/server/uploads
          mkdir -p /home/$USER/enoterra_erp/server/fonts
    
    - name: Deploy frontend
      uses: easingthemes/ssh-deploy@main
      env:  
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "dist/"
        TARGET: "/home/${{ secrets.REMOTE_USER }}/enoterra_erp/"
        ARGS: "-avz --delete"
    
    - name: Deploy server
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "server/"
        TARGET: "/home/${{ secrets.REMOTE_USER }}/enoterra_erp/server/"
        EXCLUDE: "enoterra_erp.db,enoterra_erp.db-wal,enoterra_erp.db-shm"
        ARGS: "-avz --delete"
    
    - name: Deploy config
      uses: easingthemes/ssh-deploy@main
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "ecosystem.config.cjs"
        TARGET: "/home/${{ secrets.REMOTE_USER }}/enoterra_erp/"
        ARGS: "-avz"
    
    - name: Install dependencies on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/$USER/enoterra_erp
          npm install --production
          cd server && npm install --production && cd ..
    
    - name: Setup PM2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/$USER/enoterra_erp
          pm2 stop enoterra_erp 2>/dev/null || true
          pm2 delete enoterra_erp 2>/dev/null || true
          pm2 start ecosystem.config.cjs
          pm2 save
          pm2 startup 